name: NameMC Checker
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  run-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          pip install aiohttp playwright playwright-stealth
          playwright install chromium --with-deps

      - name: 🚀 Run checker
        env:
          PYTHONUNBUFFERED: "1"
          CHECK_INTERVAL: "30"
        run: |
          python -u main.py
